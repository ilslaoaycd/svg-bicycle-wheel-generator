<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150" preserveAspectRatio="xMidYMid meet" class="hub-svg"><style>.wheel-svg,.hub-svg{background:var(--wheel-svg-background, #ffffff)}.rim-body{fill:var(--wheel-rim-side-fill, #222529);stroke:var(--wheel-rim-stroke, #111111);stroke-width:1;fill-rule:evenodd}.rim-outline{fill:none;stroke:var(--wheel-rim-outline-stroke, #111111);stroke-width:1.5}.rim-highlight{fill:none;stroke:var(--wheel-rim-highlight-stroke, rgba(255,255,255,.18));stroke-width:1}.rim-hole{fill:var(--wheel-rim-hole-fill, #101214);stroke:var(--wheel-rim-hole-stroke, #101214);stroke-width:0.5}.valve-hole-marker{fill:var(--wheel-valve-fill, #2f3438)}.valve-hole-line{stroke:var(--wheel-valve-stroke, #111111);stroke-width:2.5;stroke-linecap:round}.valve-label{font-family:sans-serif;font-size:14px;fill:var(--wheel-valve-label-fill, #495057);font-weight:bold}.wheel-valve-part{fill:var(--wheel-valve-fill, #2f3438);stroke:var(--wheel-valve-stroke, #111111);stroke-width:1}.spoke-nipple{stroke-width:5;stroke-linecap:butt}.spoke-nipple-dot{fill:var(--wheel-nipple-dot-fill, #ffffff);stroke:var(--wheel-nipple-dot-stroke, #111111);stroke-width:1}.nipple-theme-silver .spoke-nipple{stroke:var(--wheel-nipple-silver, #111111)}.nipple-theme-black .spoke-nipple{stroke:var(--wheel-nipple-black, #111111)}.spoke{stroke-width:1.5;stroke-linecap:round}.spoke-theme-color .spoke-left.spoke-pulling{stroke:var(--wheel-spoke-left-pulling, #111111)}.spoke-theme-color .spoke-left.spoke-trailing{stroke:var(--wheel-spoke-left-trailing, #111111)}.spoke-theme-color .spoke-right.spoke-pulling{stroke:var(--wheel-spoke-right-pulling, #111111);stroke-dasharray:4 4}.spoke-theme-color .spoke-right.spoke-trailing{stroke:var(--wheel-spoke-right-trailing, #111111);stroke-dasharray:4 4}.spoke-theme-black .spoke{stroke:var(--wheel-spoke-black, #111111)}.spoke-theme-silver .spoke{stroke:var(--wheel-spoke-silver, #ced4da)}.hub-axle,.hub-axle-tip{fill:var(--wheel-hub-axle-fill, #d9dcde);stroke:var(--wheel-hub-axle-stroke, #222222);stroke-width:0.8}.hub-endcap{fill:var(--wheel-hub-endcap-fill, #7d848a);stroke:var(--wheel-hub-endcap-stroke, #25282b);stroke-width:1}.hub-cylinder,.hub-shell-body{fill:var(--wheel-hub-shell-fill, #bfc4c8);stroke:var(--wheel-hub-shell-stroke, #3c4145);stroke-width:1.2;fill-rule:evenodd}.hub-brand-dt-swiss .hub-shell-body{fill:var(--wheel-hub-shell-dt-swiss-fill, #c9ced2)}.hub-brand-industry-nine .hub-shell-body{fill:var(--wheel-hub-shell-industry-nine-fill, #b5bcc1)}.hub-flange-left{fill:var(--wheel-hub-flange-left-fill, #d2d6d9);stroke:var(--wheel-hub-flange-left-stroke, #3c4145);stroke-width:1;fill-rule:evenodd}.hub-flange-right{fill:var(--wheel-hub-flange-right-fill, #aeb5ba);stroke:var(--wheel-hub-flange-right-stroke, #3c4145);stroke-width:1;fill-rule:evenodd}.hub-flange-plate{stroke-width:1.1}.hub-brake-mount,.hub-centerlock-side,.hub-sixbolt-side{fill:var(--wheel-hub-mount-fill, #969da3);stroke:var(--wheel-hub-mount-stroke, #2c3033);stroke-width:1;fill-rule:evenodd}.hub-cylinder-freehub{fill:var(--wheel-hub-freehub-fill, #c8ccd0);stroke:var(--wheel-hub-freehub-stroke, #3c4145);stroke-width:1;fill-rule:evenodd}.hub-cylinder-dark,.hub-bearing-ring,.hub-freehub-inner-shoulder,.hub-freehub-thread-step{fill:var(--wheel-hub-bearing-fill, #6f767c);stroke:var(--wheel-hub-bearing-stroke, #2c3033);stroke-width:1}.hub-flange-cutout,.hub-flange-scallop{fill:var(--wheel-hub-cutout-fill, #f1f2f3);stroke:var(--wheel-hub-cutout-stroke, #3c4145);stroke-width:0.7}.hub-spoke-hole-side{fill:var(--wheel-hub-hole-fill, #111111);stroke:none}.hub-bolt-head-side{fill:var(--wheel-hub-cutout-fill, #f1f2f3);stroke:var(--wheel-hub-detail-stroke, #24272a);stroke-width:0.6}.hub-spline-line,.hub-freehub-spline,.hub-centerlock-tooth,.hub-sixbolt-side-line,.hub-freehub-thread-line,.hub-freehub-final-step-line,.hub-straightpull-slot-side{stroke:var(--wheel-hub-detail-stroke, #24272a);stroke-width:1;stroke-linecap:round;fill:none}.hub-blueprint-line{stroke:var(--wheel-hub-blueprint-stroke, #24272a);stroke-width:0.7;stroke-dasharray:3 3;fill:none;opacity:0.9}.hub-shell-flute{stroke:var(--wheel-hub-flute-stroke, #6d747a);stroke-width:0.9;stroke-linecap:round;fill:none}.hub-shell-highlight{stroke:var(--wheel-hub-highlight-stroke, #eceff1);stroke-width:1;stroke-linecap:round}.hub-centerlock-solid-ring,.hub-freehub-xd-center-ring{fill:none;stroke:var(--wheel-hub-detail-stroke, #24272a);stroke-width:1}.hub-centerlock-dashed-ring,.hub-freehub-xd-middle-ring{fill:none;stroke:var(--wheel-hub-detail-stroke, #24272a);stroke-width:1;stroke-dasharray:1 1}</style><g class="hub-face-group hub-brand-dt-swiss hub-render-realistic"><path d="M 75 45.8 A 29.2 29.2 0 0 1 75 104.2 A 29.2 29.2 0 0 1 75 45.8 Z M 75 69 A 6 6 0 0 0 75 81 A 6 6 0 0 0 75 69 Z " class="hub-flange-right" fill="var(--wheel-hub-flange-right-fill, #aeb5ba)" stroke="var(--wheel-hub-flange-right-stroke, #3c4145)" stroke-width="1.1"/><path d="M 75 45.8 A 29.2 29.2 0 0 1 75 104.2 A 29.2 29.2 0 0 1 75 45.8 Z M 75 69 A 6 6 0 0 0 75 81 A 6 6 0 0 0 75 69 Z " class="hub-flange-left" fill="var(--wheel-hub-flange-left-fill, #d2d6d9)" stroke="var(--wheel-hub-flange-left-stroke, #3c4145)" stroke-width="1.1"/><circle cx="75" cy="75" r="17" class="hub-centerlock-solid-ring" fill="none" stroke="var(--wheel-hub-detail-stroke, #24272a)" stroke-width="1"/><circle cx="75" cy="75" r="17.5" class="hub-centerlock-dashed-ring" fill="none" stroke="var(--wheel-hub-detail-stroke, #24272a)" stroke-width="1" stroke-dasharray="1 1"/></g></svg>
