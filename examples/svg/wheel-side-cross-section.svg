s="hub-sixbolt-side-line" fill="none" stroke="#315c82" stroke-width="0.75" stroke-linecap="round" opacity="0.65"/><line x1="37.7" y1="381" x2="41.3" y2="381" class="hub-sixbolt-side-line" fill="none" stroke="#315c82" stroke-width="0.75" stroke-linecap="round" opacity="0.65"/><line x1="127.3" y1="364.5" x2="162" y2="364.5" class="hub-freehub-spline" fill="none" stroke="#315c82" stroke-width="0.75" stroke-linecap="round" opacity="0.7"/><line x1="127.3" y1="371.5" x2="162" y2="371.5" class="hub-freehub-spline" fill="none" stroke="#315c82" stroke-width="0.75" stroke-linecap="round" opacity="0.7"/><line x1="127.3" y1="378.5" x2="162" y2="378.5" class="hub-freehub-spline" fill="none" stroke="#315c82" stroke-width="0.75" stroke-linecap="round" opacity="0.7"/><line x1="127.3" y1="385.5" x2="162" y2="385.5" class="hub-freehub-spline" fill="none" stroke="#315c82" stroke-width="0.75" stroke-linecap="round" opacity="0.7"/><line x1="29" y1="430" x2="29" y2="440" class="hub-blueprint-line" fill="none" stroke="#78a9d4" stroke-width="0.7" stroke-dasharray="3 3"/><line x1="171" y1="430" x2="171" y2="440" class="hub-blueprint-line" fill="none" stroke="#78a9d4" stroke-width="0.7" stroke-dasharray="3 3"/></g><g class="nipple-theme-silver"><line x1="100" y1="74.5" x2="98.664" y2="84.41" class="spoke-nipple"/><line x1="100" y1="74.5" x2="100.846" y2="84.464" class="spoke-nipple"/><line x1="100" y1="675.5" x2="98.664" y2="665.59" class="spoke-nipple"/><line x1="100" y1="675.5" x2="100.846" y2="665.536" class="spoke-nipple"/></g><g id="rimGroup"><path d="M 87.5 58 L 112.5 58 L 112.5 66.25 L 104.167 74.5 L 95.833 74.5 L 87.5 66.25 Z" class="rim-body"/><path d="M 95.833 675.5 L 104.167 675.5 L 112.5 683.75 L 112.5 692 L 87.5 692 L 87.5 683.75 Z" class="rim-body"/></g></svg>
