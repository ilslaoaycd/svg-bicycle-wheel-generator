<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150" preserveAspectRatio="xMidYMid meet" class="hub-svg"><style>
    :root{--rim-color:#343a40;--spoke-left-pulling:#0d6efd;--spoke-left-trailing:#0dcaf0;--spoke-right-pulling:#fd7e14;--spoke-right-trailing:#ffc107}
    .wheel-svg,.hub-svg{background:#fff}
    .rim-body{fill:#343a40;stroke:#212529;stroke-width:1;fill-rule:evenodd}
    .rim-outline{fill:none;stroke:#111;stroke-width:1.5}
    .rim-highlight{fill:none;stroke:rgba(255,255,255,.15);stroke-width:1}
    .hub-flange-right{fill:#dce8f3;stroke:#244b6f;stroke-width:1;fill-rule:evenodd}
    .hub-flange-left{fill:#e6eef6;stroke:#244b6f;stroke-width:1;fill-rule:evenodd}
    .hub-brake-mount{fill:#d4e1ec;stroke:#244b6f;stroke-width:1;fill-rule:evenodd}
    .hub-cylinder{fill:#eaf1f8;stroke:#244b6f;stroke-width:1;fill-rule:evenodd}
    .hub-cylinder-dark{fill:#d8e4ef;stroke:#244b6f;stroke-width:1;fill-rule:evenodd}
    .hub-cylinder-freehub{fill:#eef3f8;stroke:#244b6f;stroke-width:1;fill-rule:evenodd}
    .hub-axle{fill:#f8fbfd;stroke:#5d7f9e;stroke-width:.8}
    .hub-endcap{fill:#e7eef5;stroke:#315c82;stroke-width:1}
    .hub-axle-tip{fill:#f8fbfd;stroke:#5d7f9e;stroke-width:.8}
    .hub-shell-body{fill:#eaf1f8;stroke:#1f4b72;stroke-width:1.2}
    .hub-brand-dt-swiss .hub-shell-body{fill:#edf3f8}
    .hub-brand-industry-nine .hub-shell-body{fill:#e3edf6}
    .hub-shell-flute{stroke:#7399ba;stroke-width:.9;stroke-linecap:round;fill:none}
    .hub-shell-highlight{stroke:#9ab9d4;stroke-width:1;stroke-linecap:round}
    .hub-bearing-ring{fill:#d2e0ec;stroke:#244b6f;stroke-width:1}
    .hub-flange-plate{stroke-width:1.1}
    .hub-flange-cutout{fill:#fff;stroke:#5d7f9e;stroke-width:.7}
    .hub-spoke-hole-side{fill:#315c82;stroke:none}
    .hub-bolt-head-side{fill:#fff;stroke:#315c82;stroke-width:.6}
    .hub-centerlock-side{fill:#dce8f3}
    .hub-sixbolt-side{fill:#dce8f3}
    .hub-spline-line,.hub-freehub-spline{stroke:#315c82;stroke-width:1;stroke-linecap:round}
    .hub-blueprint-line{stroke:#78a9d4;stroke-width:.7;stroke-dasharray:3 3;fill:none;opacity:.9}
    .rim-hole{fill:#111;stroke:#343a40;stroke-width:.5}
    .valve-hole-marker{fill:#dc3545}
    .valve-hole-line{stroke:#dc3545;stroke-width:2.5;stroke-linecap:round}
    .valve-label{font-family:sans-serif;font-size:14px;fill:#495057;font-weight:bold}
    .spoke-nipple{stroke-width:5;stroke-linecap:butt}
    .nipple-theme-silver .spoke-nipple{stroke:#adb5bd}
    .nipple-theme-black .spoke-nipple{stroke:#212529}
    .spoke{stroke-width:1.5;stroke-linecap:round}
    .spoke-theme-color .spoke-left.spoke-pulling{stroke:#0d6efd}
    .spoke-theme-color .spoke-left.spoke-trailing{stroke:#0dcaf0}
    .spoke-theme-color .spoke-right.spoke-pulling{stroke:#fd7e14;stroke-dasharray:4 4}
    .spoke-theme-color .spoke-right.spoke-trailing{stroke:#ffc107;stroke-dasharray:4 4}
    .spoke-theme-black .spoke{stroke:#212529}
    .spoke-theme-silver .spoke{stroke:#ced4da}
  </style><g class="hub-side-group hub-brand-dt-swiss hub-shell-smooth-taper hub-render-blueprint" data-hub-preset="dt-swiss-240-exp-boost-rear-centerlock"><path d="M 27.5 66 L 34 66 L 34 84 L 27.5 84 L 26 82.5 L 26 67.5 Z" class="hub-endcap" fill="#e7eef5" stroke="#315c82" stroke-width="1"/><path d="M 35.2 57 L 37.8 57 L 39 58.2 L 39 91.8 L 37.8 93 L 35.2 93 L 34 91.8 L 34 58.2 Z" class="hub-brake-mount hub-centerlock-side" fill="#dce8f3" stroke="#244b6f" stroke-width="1"/><path d="M 39 57 C 43 57 55.95 53.8 60.95 53.8 L 64.45 53.8 C 75.115 53.8 89.335 63 100 63 C 106.255 63 114.595 53.8 120.85 53.8 L 124.35 53.8 C 128.35 49.8 125 58.5 129 58.5 L 129 91.5 C 125 91.5 128.35 100.2 124.35 100.2 L 120.85 96.2 C 114.595 96.2 106.255 87 100 87 C 89.335 87 75.115 96.2 64.45 96.2 L 60.95 96.2 C 55.95 96.2 43 93 39 93 Z" class="hub-cylinder hub-shell-body" fill="#eaf1f8" stroke="#1f4b72" stroke-width="1.2"/><path d="M 62.117 49.8 L 63.283 49.8 L 64.45 50.967 L 64.45 99.033 L 63.283 100.2 L 62.117 100.2 L 60.95 99.033 L 60.95 50.967 Z" class="hub-flange-left hub-flange-plate" fill="#e6eef6" stroke="#244b6f" stroke-width="1.1"/><path d="M 122.017 49.8 L 123.183 49.8 L 124.35 50.967 L 124.35 99.033 L 123.183 100.2 L 122.017 100.2 L 120.85 99.033 L 120.85 50.967 Z" class="hub-flange-right hub-flange-plate" fill="#dce8f3" stroke="#244b6f" stroke-width="1.1"/><path d="M 129 58.5 L 166 58.5 L 166 91.5 L 129 91.5 Z" class="hub-cylinder-freehub hub-freehub-hg" fill="#eef3f8" stroke="#244b6f" stroke-width="1"/><path d="M 166 66 L 172.5 66 L 174 67.5 L 174 82.5 L 172.5 84 L 166 84 Z" class="hub-endcap" fill="#e7eef5" stroke="#315c82" stroke-width="1"/><line x1="35.5" y1="58" x2="35.5" y2="92" class="hub-centerlock-tooth" fill="none" stroke="#315c82" stroke-width="0.55" stroke-linecap="round" opacity="0.55"/><line x1="37.1" y1="58" x2="37.1" y2="92" class="hub-centerlock-tooth" fill="none" stroke="#315c82" stroke-width="0.55" stroke-linecap="round" opacity="0.55"/><line x1="38.7" y1="58" x2="38.7" y2="92" class="hub-centerlock-tooth" fill="none" stroke="#315c82" stroke-width="0.55" stroke-linecap="round" opacity="0.55"/><line x1="129" y1="65.1" x2="165" y2="65.1" class="hub-freehub-spline" fill="none" stroke="#315c82" stroke-width="0.75" stroke-linecap="round" opacity="0.7"/><line x1="129" y1="71.7" x2="165" y2="71.7" class="hub-freehub-spline" fill="none" stroke="#315c82" stroke-width="0.75" stroke-linecap="round" opacity="0.7"/><line x1="129" y1="78.3" x2="165" y2="78.3" class="hub-freehub-spline" fill="none" stroke="#315c82" stroke-width="0.75" stroke-linecap="round" opacity="0.7"/><line x1="129" y1="84.9" x2="165" y2="84.9" class="hub-freehub-spline" fill="none" stroke="#315c82" stroke-width="0.75" stroke-linecap="round" opacity="0.7"/><line x1="26" y1="130" x2="26" y2="140" class="hub-blueprint-line" fill="none" stroke="#78a9d4" stroke-width="0.7" stroke-dasharray="3 3"/><line x1="174" y1="130" x2="174" y2="140" class="hub-blueprint-line" fill="none" stroke="#78a9d4" stroke-width="0.7" stroke-dasharray="3 3"/></g></svg>
