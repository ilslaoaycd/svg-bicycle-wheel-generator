<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150" preserveAspectRatio="xMidYMid meet" class="hub-svg"><style>
    :root{--rim-color:#343a40;--spoke-left-pulling:#0d6efd;--spoke-left-trailing:#0dcaf0;--spoke-right-pulling:#fd7e14;--spoke-right-trailing:#ffc107}
    .wheel-svg,.hub-svg{background:#fff}
    .rim-body{fill:#343a40;stroke:#212529;stroke-width:1;fill-rule:evenodd}
    .rim-outline{fill:none;stroke:#111;stroke-width:1.5}
    .rim-highlight{fill:none;stroke:rgba(255,255,255,.15);stroke-width:1}
    .hub-flange-right{fill:#dce8f3;stroke:#244b6f;stroke-width:1;fill-rule:evenodd}
    .hub-flange-left{fill:#e6eef6;stroke:#244b6f;stroke-width:1;fill-rule:evenodd}
    .hub-brake-mount{fill:#d4e1ec;stroke:#244b6f;stroke-width:1;fill-rule:evenodd}
    .hub-cylinder{fill:#eaf1f8;stroke:#244b6f;stroke-width:1;fill-rule:evenodd}
    .hub-cylinder-dark{fill:#d8e4ef;stroke:#244b6f;stroke-width:1;fill-rule:evenodd}
    .hub-cylinder-freehub{fill:#eef3f8;stroke:#244b6f;stroke-width:1;fill-rule:evenodd}
    .hub-axle{fill:#f8fbfd;stroke:#5d7f9e;stroke-width:.8}
    .hub-endcap{fill:#e7eef5;stroke:#315c82;stroke-width:1}
    .hub-axle-tip{fill:#f8fbfd;stroke:#5d7f9e;stroke-width:.8}
    .hub-shell-body{fill:#eaf1f8;stroke:#1f4b72;stroke-width:1.2}
    .hub-brand-dt-swiss .hub-shell-body{fill:#edf3f8}
    .hub-brand-industry-nine .hub-shell-body{fill:#e3edf6}
    .hub-shell-flute{stroke:#7399ba;stroke-width:.9;stroke-linecap:round;fill:none}
    .hub-shell-highlight{stroke:#9ab9d4;stroke-width:1;stroke-linecap:round}
    .hub-bearing-ring{fill:#d2e0ec;stroke:#244b6f;stroke-width:1}
    .hub-flange-plate{stroke-width:1.1}
    .hub-flange-cutout{fill:#fff;stroke:#5d7f9e;stroke-width:.7}
    .hub-spoke-hole-side{fill:#315c82;stroke:none}
    .hub-bolt-head-side{fill:#fff;stroke:#315c82;stroke-width:.6}
    .hub-centerlock-side{fill:#dce8f3}
    .hub-sixbolt-side{fill:#dce8f3}
    .hub-spline-line,.hub-freehub-spline{stroke:#315c82;stroke-width:1;stroke-linecap:round}
    .hub-blueprint-line{stroke:#78a9d4;stroke-width:.7;stroke-dasharray:3 3;fill:none;opacity:.9}
    .rim-hole{fill:#111;stroke:#343a40;stroke-width:.5}
    .valve-hole-marker{fill:#dc3545}
    .valve-hole-line{stroke:#dc3545;stroke-width:2.5;stroke-linecap:round}
    .valve-label{font-family:sans-serif;font-size:14px;fill:#495057;font-weight:bold}
    .spoke-nipple{stroke-width:5;stroke-linecap:butt}
    .nipple-theme-silver .spoke-nipple{stroke:#adb5bd}
    .nipple-theme-black .spoke-nipple{stroke:#212529}
    .spoke{stroke-width:1.5;stroke-linecap:round}
    .spoke-theme-color .spoke-left.spoke-pulling{stroke:#0d6efd}
    .spoke-theme-color .spoke-left.spoke-trailing{stroke:#0dcaf0}
    .spoke-theme-color .spoke-right.spoke-pulling{stroke:#fd7e14;stroke-dasharray:4 4}
    .spoke-theme-color .spoke-right.spoke-trailing{stroke:#ffc107;stroke-dasharray:4 4}
    .spoke-theme-black .spoke{stroke:#212529}
    .spoke-theme-silver .spoke{stroke:#ced4da}
  </style><g class="hub-side-group hub-brand-generic hub-shell-tapered hub-render-blueprint"><path d="M 30.5 66 L 37 66 L 37 84 L 30.5 84 L 29 82.5 L 29 67.5 Z" class="hub-endcap" fill="#e7eef5" stroke="#315c82" stroke-width="1"/><path d="M 38.2 57 L 40.8 57 L 42 58.2 L 42 91.8 L 40.8 93 L 38.2 93 L 37 91.8 L 37 58.2 Z" class="hub-brake-mount hub-6bolt-side" fill="#dce8f3" stroke="#244b6f" stroke-width="1"/><path d="M 42 57 C 46 57 56.4 50 61.4 50 L 65.4 50 C 77.51 50 87.89 62.5 100 62.5 C 107.455 62.5 113.845 53 121.3 53 L 125.3 53 C 129.3 49 123.3 57.5 127.3 57.5 L 127.3 92.5 C 123.3 92.5 129.3 101 125.3 101 L 121.3 97 C 113.845 97 107.455 87.5 100 87.5 C 87.89 87.5 77.51 100 65.4 100 L 61.4 100 C 56.4 100 46 93 42 93 Z" class="hub-cylinder hub-shell-body" fill="#eaf1f8" stroke="#1f4b72" stroke-width="1.2"/><path d="M 62.6 46 L 64.2 46 L 65.4 47.2 L 65.4 102.8 L 64.2 104 L 62.6 104 L 61.4 102.8 L 61.4 47.2 Z" class="hub-flange-left hub-flange-plate" fill="#e6eef6" stroke="#244b6f" stroke-width="1.1"/><path d="M 122.5 49 L 124.1 49 L 125.3 50.2 L 125.3 99.8 L 124.1 101 L 122.5 101 L 121.3 99.8 L 121.3 50.2 Z" class="hub-flange-right hub-flange-plate" fill="#dce8f3" stroke="#244b6f" stroke-width="1.1"/><path d="M 127.3 57.5 L 163 57.5 L 163 92.5 L 127.3 92.5 Z" class="hub-cylinder-freehub hub-freehub-hg" fill="#eef3f8" stroke="#244b6f" stroke-width="1"/><path d="M 163 66 L 169.5 66 L 171 67.5 L 171 82.5 L 169.5 84 L 163 84 Z" class="hub-endcap" fill="#e7eef5" stroke="#315c82" stroke-width="1"/><line x1="37.7" y1="69" x2="41.3" y2="69" class="hub-sixbolt-side-line" fill="none" stroke="#315c82" stroke-width="0.75" stroke-linecap="round" opacity="0.65"/><line x1="37.7" y1="81" x2="41.3" y2="81" class="hub-sixbolt-side-line" fill="none" stroke="#315c82" stroke-width="0.75" stroke-linecap="round" opacity="0.65"/><line x1="127.3" y1="64.5" x2="162" y2="64.5" class="hub-freehub-spline" fill="none" stroke="#315c82" stroke-width="0.75" stroke-linecap="round" opacity="0.7"/><line x1="127.3" y1="71.5" x2="162" y2="71.5" class="hub-freehub-spline" fill="none" stroke="#315c82" stroke-width="0.75" stroke-linecap="round" opacity="0.7"/><line x1="127.3" y1="78.5" x2="162" y2="78.5" class="hub-freehub-spline" fill="none" stroke="#315c82" stroke-width="0.75" stroke-linecap="round" opacity="0.7"/><line x1="127.3" y1="85.5" x2="162" y2="85.5" class="hub-freehub-spline" fill="none" stroke="#315c82" stroke-width="0.75" stroke-linecap="round" opacity="0.7"/><line x1="29" y1="130" x2="29" y2="140" class="hub-blueprint-line" fill="none" stroke="#78a9d4" stroke-width="0.7" stroke-dasharray="3 3"/><line x1="171" y1="130" x2="171" y2="140" class="hub-blueprint-line" fill="none" stroke="#78a9d4" stroke-width="0.7" stroke-dasharray="3 3"/></g></svg>
