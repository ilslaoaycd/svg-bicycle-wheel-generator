    .wheel-spoke.muted{stroke:#94a3b8;opacity:.42}
    .wheel-spoke.trailing{stroke-dasharray:7 5}
    .wheel-hub{fill:#1f2933;stroke:#0f1720;stroke-width:2}
    .wheel-hole{fill:#ffffff;stroke:#c0392b;stroke-width:2}
    .wheel-marker{fill:#c0392b;stroke:#ffffff;stroke-width:3}
    .wheel-label{fill:#344054;font:600 16px system-ui,sans-serif}
    .wheel-dim{stroke:#10b981;stroke-width:3;fill:none;stroke-linecap:round}
    .wheel-dim-text{fill:#344054;font:600 14px system-ui,sans-serif}
    .wheel-shell{fill:#1f2933;stroke:#0f1720;stroke-width:2}
    .wheel-cassette-slot svg{overflow:visible}
