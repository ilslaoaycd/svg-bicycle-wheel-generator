<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150" preserveAspectRatio="xMidYMid meet" class="hub-svg"><style>.wheel-svg,.hub-svg{background:var(--wheel-svg-background, #ffffff)}.rim-body{fill:var(--wheel-rim-side-fill, #222529);stroke:var(--wheel-rim-stroke, #111111);stroke-width:1;fill-rule:evenodd}.rim-outline{fill:none;stroke:var(--wheel-rim-outline-stroke, #111111);stroke-width:1.5}.rim-highlight{fill:none;stroke:var(--wheel-rim-highlight-stroke, rgba(255,255,255,.18));stroke-width:1}.rim-hole{fill:var(--wheel-rim-hole-fill, #101214);stroke:var(--wheel-rim-hole-stroke, #101214);stroke-width:0.5}.valve-hole-marker{fill:var(--wheel-valve-fill, #2f3438)}.valve-hole-line{stroke:var(--wheel-valve-stroke, #111111);stroke-width:2.5;stroke-linecap:round}.valve-label{font-family:sans-serif;font-size:14px;fill:var(--wheel-valve-label-fill, #495057);font-weight:bold}.wheel-valve-part{fill:var(--wheel-valve-fill, #2f3438);stroke:var(--wheel-valve-stroke, #111111);stroke-width:1}.spoke-nipple{stroke-width:5;stroke-linecap:butt}.spoke-nipple-dot{fill:var(--wheel-nipple-dot-fill, #ffffff);stroke:var(--wheel-nipple-dot-stroke, #111111);stroke-width:1}.nipple-theme-silver .spoke-nipple{stroke:var(--wheel-nipple-silver, #111111)}.nipple-theme-black .spoke-nipple{stroke:var(--wheel-nipple-black, #111111)}.spoke{stroke-width:1.5;stroke-linecap:round}.spoke-theme-color .spoke-left.spoke-pulling{stroke:var(--wheel-spoke-left-pulling, #111111)}.spoke-theme-color .spoke-left.spoke-trailing{stroke:var(--wheel-spoke-left-trailing, #111111)}.spoke-theme-color .spoke-right.spoke-pulling{stroke:var(--wheel-spoke-right-pulling, #111111);stroke-dasharray:4 4}.spoke-theme-color .spoke-right.spoke-trailing{stroke:var(--wheel-spoke-right-trailing, #111111);stroke-dasharray:4 4}.spoke-theme-black .spoke{stroke:var(--wheel-spoke-black, #111111)}.spoke-theme-silver .spoke{stroke:var(--wheel-spoke-silver, #ced4da)}.hub-axle,.hub-axle-tip{fill:var(--wheel-hub-axle