<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SVG Bicycle Wheel Generator ESM</title>
  <style>
    body { margin: 0; padding: 24px; font-family: system-ui, sans-serif; background: #f8f9fa; }
    #wheel { max-width: 760px; margin: 0 auto; background: white; border: 1px solid #dee2e6; }
  </style>
</head>
<body>
  <div id="wheel"></div>
  <script type="module">
    import { renderWheelFaceSvg } from '../../src/index.js';

    document.querySelector('#wheel').innerHTML = renderWheelFaceSvg({
      view: { wheelFaceSide: 'right' },
      wheel: { valveType: 'presta' },
      hub: { hubPosition: 'rear', brakeType: '6bolt' }
    });
  </script>
</body>
</html>
