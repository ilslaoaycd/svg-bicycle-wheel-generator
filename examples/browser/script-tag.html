<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SVG Bicycle Wheel Generator Script Tag</title>
  <style>
    body { margin: 0; padding: 24px; font-family: system-ui, sans-serif; background: #f8f9fa; }
    #wheel { max-width: 760px; margin: 0 auto; background: white; border: 1px solid #dee2e6; }
  </style>
</head>
<body>
  <div id="wheel"></div>
  <script src="../../dist/bicycle-wheel-svg.global.js"></script>
  <script>
    document.querySelector('#wheel').innerHTML = BicycleWheelSVG.renderWheelFaceSvg({
      view: { wheelFaceSide: 'left' },
      hub: { brakeType: 'centerlock', hubType: 'straightpull' },
      style: { spokeColor: 'silver' }
    });
  </script>
</body>
</html>
